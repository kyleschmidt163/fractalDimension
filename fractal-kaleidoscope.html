<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fractal Kaleidoscope</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden;cursor:default;user-select:none;touch-action:none}
  canvas{display:block;position:fixed;top:0;left:0}
  .ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
  .hd{position:absolute;top:16px;left:18px;font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(10px,2.2vw,13px);letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,0.35)}
  .st{position:absolute;top:16px;right:18px;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1.5px;color:rgba(255,255,255,0.15)}
  .mt{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);pointer-events:all;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:7px 18px;cursor:pointer;font-family:'Orbitron',monospace;font-size:7px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);transition:all 0.3s;display:flex;align-items:center;gap:8px}
  .mt:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)}
  .mt .aw{transition:transform 0.3s;font-size:9px}
  .mt.open .aw{transform:rotate(180deg)}
  .dw{position:absolute;bottom:48px;left:0;right:0;max-height:0;overflow:hidden;transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1),opacity 0.3s;opacity:0;pointer-events:none}
  .dw.open{max-height:60vh;opacity:1;pointer-events:all}
  .di{margin:0 12px;background:rgba(0,0,0,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:18px 20px;display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
  .ps{display:flex;flex-direction:column;gap:8px;min-width:110px}
  .sl{font-family:'Orbitron',monospace;font-size:6.5px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.18)}
  .rw{display:flex;align-items:center;gap:8px}
  .lb{font-family:'Orbitron',monospace;font-size:6.5px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.22);min-width:42px}
  .vl{font-family:'Orbitron',monospace;font-size:6.5px;color:rgba(255,255,255,0.3);min-width:22px;text-align:right}
  input[type="range"]{-webkit-appearance:none;appearance:none;flex:1;height:1px;background:rgba(255,255,255,0.08);outline:none}
  input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;border:1px solid rgba(255,255,255,0.1)}
  .br{display:flex;gap:3px;flex-wrap:wrap}
  .bn{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.2);font-family:'Orbitron',monospace;font-size:6.5px;letter-spacing:1.5px;padding:4px 7px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;border-radius:3px}
  .bn:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5)}
  .bn.on{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.2)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="ui">
  <div class="hd">Fractal Kaleidoscope</div>
  <div class="st" id="fps"></div>
  <div class="dw" id="dw"><div class="di">
    <div class="ps">
      <div class="sl">Symmetry</div>
      <div class="br">
        <button class="bn" data-k="3">3</button>
        <button class="bn" data-k="4">4</button>
        <button class="bn on" data-k="6">6</button>
        <button class="bn" data-k="8">8</button>
        <button class="bn" data-k="10">10</button>
        <button class="bn" data-k="12">12</button>
      </div>
    </div>
    <div class="ps">
      <div class="sl">Motion</div>
      <div class="rw"><span class="lb">Drift</span><input type="range" id="rDr" min="5" max="100" value="40"><span class="vl" id="xDr">40</span></div>
      <div class="rw"><span class="lb">Spin</span><input type="range" id="rSp" min="0" max="100" value="25"><span class="vl" id="xSp">25</span></div>
      <div class="rw"><span class="lb">Pulse</span><input type="range" id="rPu" min="0" max="100" value="30"><span class="vl" id="xPu">30</span></div>
    </div>
    <div class="ps">
      <div class="sl">Palette</div>
      <div class="br">
        <button class="bn on" data-c="0">Prism</button>
        <button class="bn" data-c="1">Ember</button>
        <button class="bn" data-c="2">Aurora</button>
        <button class="bn" data-c="3">Neon</button>
        <button class="bn" data-c="4">Abyss</button>
      </div>
    </div>
    <div class="ps">
      <div class="sl">Preset</div>
      <div class="br">
        <button class="bn on" data-q="mandala">Mandala</button>
        <button class="bn" data-q="flower">Flower</button>
        <button class="bn" data-q="crystal">Crystal</button>
        <button class="bn" data-q="hypnotic">Hypnotic</button>
        <button class="bn" data-q="bloom">Slow Bloom</button>
      </div>
    </div>
  </div></div>
  <button class="mt" id="tog"><span class="aw">&#9650;</span> Controls</button>
</div>
<script>
document.getElementById('tog').addEventListener('click', function() {
  document.getElementById('dw').classList.toggle('open');
  this.classList.toggle('open');
});

var cv = document.getElementById('cv');
var gl = cv.getContext('webgl', {antialias: false});
if (!gl) {
  document.body.innerHTML = '<h1 style="color:#fff;padding:40px">WebGL not supported</h1>';
  throw new Error('no gl');
}

var W, H, dpr;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  cv.width = W * dpr;
  cv.height = H * dpr;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
  gl.viewport(0, 0, cv.width, cv.height);
}
resize();
window.addEventListener('resize', resize);

var vertSrc = 'attribute vec2 pos; void main() { gl_Position = vec4(pos, 0.0, 1.0); }';

var fragSrc = ''
+ 'precision highp float;\n'
+ 'uniform vec2 uRes;\n'
+ 'uniform float uTime, uKaleid, uSpinAng, uDriftVal, uPulseVal;\n'
+ 'uniform int uPalette, uIterMax;\n'
+ '\n'
+ 'vec3 cpal(float ct, vec3 ca, vec3 cb, vec3 cc, vec3 cd) {\n'
+ '  return ca + cb * cos(6.2831853 * (cc * ct + cd));\n'
+ '}\n'
+ '\n'
+ 'vec3 getCol(float ct, int cp) {\n'
+ '  ct = fract(ct);\n'
+ '  if (cp == 1) return cpal(ct, vec3(0.5,0.2,0.07), vec3(0.5,0.35,0.25), vec3(1.0,0.7,0.5), vec3(0.0,0.12,0.2));\n'
+ '  if (cp == 2) return cpal(ct, vec3(0.2,0.4,0.3), vec3(0.3,0.3,0.4), vec3(0.8,1.0,0.9), vec3(0.1,0.25,0.15));\n'
+ '  if (cp == 3) return cpal(ct, vec3(0.5), vec3(0.5), vec3(1.0,1.0,0.5), vec3(0.0,0.15,0.5));\n'
+ '  if (cp == 4) return cpal(ct, vec3(0.1,0.03,0.18), vec3(0.15,0.06,0.25), vec3(1.0,0.5,1.0), vec3(0.0,0.08,0.12));\n'
+ '  return cpal(ct, vec3(0.5), vec3(0.5), vec3(1.0), vec3(0.0,0.33,0.67));\n'
+ '}\n'
+ '\n'
+ 'void main() {\n'
+ '  vec2 pix = (gl_FragCoord.xy - uRes * 0.5) / min(uRes.x, uRes.y);\n'
+ '  float ang = atan(pix.y, pix.x) + uSpinAng;\n'
+ '  float rad = length(pix);\n'
+ '  float segSz = 6.2831853 / uKaleid;\n'
+ '  ang = mod(ang, segSz);\n'
+ '  if (ang > segSz * 0.5) ang = segSz - ang;\n'
+ '  pix = vec2(cos(ang), sin(ang)) * rad;\n'
+ '  float ds = uDriftVal * 0.01;\n'
+ '  float theta = uTime * 0.08 * ds + sin(uTime * 0.03) * 0.5;\n'
+ '  float cenX = cos(theta) * 0.5 - cos(2.0 * theta) * 0.25;\n'
+ '  float cenY = sin(theta) * 0.5 - sin(2.0 * theta) * 0.25;\n'
+ '  float zPulse = 1.0 + sin(uTime * 0.2) * uPulseVal * 0.003;\n'
+ '  float zm = 3.2 * zPulse + sin(uTime * 0.07) * 0.15 * uPulseVal * 0.01;\n'
+ '  float cReal = pix.x / zm + cenX;\n'
+ '  float cImag = pix.y / zm + cenY;\n'
+ '  float zReal = 0.0, zImag = 0.0;\n'
+ '  int escAt = -1;\n'
+ '  float finalMag = 0.0;\n'
+ '  for (int iter = 0; iter < 500; iter++) {\n'
+ '    if (iter >= uIterMax) break;\n'
+ '    float mag2 = zReal * zReal + zImag * zImag;\n'
+ '    if (mag2 > 256.0) { escAt = iter; finalMag = mag2; break; }\n'
+ '    float newReal = zReal * zReal - zImag * zImag + cReal;\n'
+ '    zImag = 2.0 * zReal * zImag + cImag;\n'
+ '    zReal = newReal;\n'
+ '  }\n'
+ '  vec3 col;\n'
+ '  if (escAt < 0) {\n'
+ '    col = cpal(uTime * 0.015 + rad * 0.8, vec3(0.005), vec3(0.012), vec3(1.0,0.6,0.8), vec3(0.0,0.25,0.5));\n'
+ '  } else {\n'
+ '    float fi = float(escAt);\n'
+ '    float logZn = log(finalMag) * 0.5;\n'
+ '    float nu = log(logZn / log(2.0)) / log(2.0);\n'
+ '    float ct = (fi + 1.0 - nu) / 14.0 + uTime * 0.035;\n'
+ '    col = getCol(ct, uPalette);\n'
+ '    float depth = fi / float(uIterMax);\n'
+ '    col *= 1.0 - depth * 0.2;\n'
+ '    col += col * pow(1.0 - depth, 2.0) * 0.4;\n'
+ '  }\n'
+ '  float glow = exp(-rad * rad * 3.0) * 0.15;\n'
+ '  col += col * glow;\n'
+ '  float vig = length((gl_FragCoord.xy / uRes - 0.5) * 1.4);\n'
+ '  col *= 1.0 - vig * vig * 0.4;\n'
+ '  col = pow(max(col, vec3(0.0)), vec3(0.9));\n'
+ '  gl_FragColor = vec4(col, 1.0);\n'
+ '}\n';

function mkS(src, ty) {
  var sh = gl.createShader(ty);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(sh));
    return null;
  }
  return sh;
}

var vShader = mkS(vertSrc, gl.VERTEX_SHADER);
var fShader = mkS(fragSrc, gl.FRAGMENT_SHADER);
if (!vShader || !fShader) throw new Error('shader compile failed');

var prog = gl.createProgram();
gl.attachShader(prog, vShader);
gl.attachShader(prog, fShader);
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  console.error('Link error:', gl.getProgramInfoLog(prog));
  throw new Error('link failed');
}
gl.useProgram(prog);

var buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
var posLoc = gl.getAttribLocation(prog, 'pos');
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

var uRes = gl.getUniformLocation(prog, 'uRes');
var uTime = gl.getUniformLocation(prog, 'uTime');
var uKaleid = gl.getUniformLocation(prog, 'uKaleid');
var uSpinAng = gl.getUniformLocation(prog, 'uSpinAng');
var uDriftVal = gl.getUniformLocation(prog, 'uDriftVal');
var uPulseVal = gl.getUniformLocation(prog, 'uPulseVal');
var uPalette = gl.getUniformLocation(prog, 'uPalette');
var uIterMax = gl.getUniformLocation(prog, 'uIterMax');

/* State */
var kalSym = 6.0;
var spinSpd = 0.25;
var driftAmt = 40.0;
var pulseAmt = 30.0;
var palIdx = 0;
var clock = 0.0;

/* UI bindings */
document.querySelectorAll('[data-k]').forEach(function(b) {
  b.addEventListener('click', function() {
    document.querySelectorAll('[data-k]').forEach(function(x) { x.classList.remove('on'); });
    b.classList.add('on');
    kalSym = Number(b.getAttribute('data-k'));
  });
});

document.querySelectorAll('[data-c]').forEach(function(b) {
  b.addEventListener('click', function() {
    document.querySelectorAll('[data-c]').forEach(function(x) { x.classList.remove('on'); });
    b.classList.add('on');
    palIdx = Number(b.getAttribute('data-c'));
  });
});

document.getElementById('rDr').addEventListener('input', function() {
  driftAmt = Number(this.value);
  document.getElementById('xDr').textContent = this.value;
});
document.getElementById('rSp').addEventListener('input', function() {
  spinSpd = Number(this.value) / 100;
  document.getElementById('xSp').textContent = this.value;
});
document.getElementById('rPu').addEventListener('input', function() {
  pulseAmt = Number(this.value);
  document.getElementById('xPu').textContent = this.value;
});

function syncUI() {
  document.querySelectorAll('[data-k]').forEach(function(b) { b.classList.toggle('on', Number(b.getAttribute('data-k')) === kalSym); });
  document.querySelectorAll('[data-c]').forEach(function(b) { b.classList.toggle('on', Number(b.getAttribute('data-c')) === palIdx); });
  document.getElementById('rDr').value = driftAmt;
  document.getElementById('xDr').textContent = Math.round(driftAmt);
  document.getElementById('rSp').value = Math.round(spinSpd * 100);
  document.getElementById('xSp').textContent = Math.round(spinSpd * 100);
  document.getElementById('rPu').value = pulseAmt;
  document.getElementById('xPu').textContent = Math.round(pulseAmt);
}

/* Presets */
var presets = {
  mandala:  {k: 6,  sp: 0.25, dr: 40, pu: 30, c: 0},
  flower:   {k: 8,  sp: 0.15, dr: 60, pu: 50, c: 2},
  crystal:  {k: 4,  sp: 0.10, dr: 25, pu: 15, c: 4},
  hypnotic: {k: 10, sp: 0.50, dr: 80, pu: 60, c: 3},
  bloom:    {k: 12, sp: 0.08, dr: 20, pu: 10, c: 1}
};

document.querySelectorAll('[data-q]').forEach(function(b) {
  b.addEventListener('click', function() {
    document.querySelectorAll('[data-q]').forEach(function(x) { x.classList.remove('on'); });
    b.classList.add('on');
    var p = presets[b.getAttribute('data-q')];
    if (!p) return;
    kalSym = p.k;
    spinSpd = p.sp;
    driftAmt = p.dr;
    pulseAmt = p.pu;
    palIdx = p.c;
    syncUI();
  });
});

/* Render */
var fc = 0, lt = performance.now(), fpv = 0;

function draw() {
  requestAnimationFrame(draw);
  clock += 0.016;

  gl.uniform2f(uRes, cv.width, cv.height);
  gl.uniform1f(uTime, clock);
  gl.uniform1f(uKaleid, kalSym);
  gl.uniform1f(uSpinAng, clock * spinSpd);
  gl.uniform1f(uDriftVal, driftAmt);
  gl.uniform1f(uPulseVal, pulseAmt);
  gl.uniform1i(uPalette, palIdx);
  gl.uniform1i(uIterMax, 400);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  fc++;
  var now = performance.now();
  if (now - lt >= 1000) { fpv = fc; fc = 0; lt = now; }
  document.getElementById('fps').textContent = fpv + ' FPS';
}

draw();
</script>
</body>
</html>
